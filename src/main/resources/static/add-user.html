<!DOCTYPE html>
<html>
<body>

<h2>Add User</h2>

<form action="/users/add" method="post">
    Name: <input type="text" name="name"><br><br>
    Email: <input type="text" name="email"><br><br>
    Role:
    <select name="role">
        <option>VIEWER</option>
        <option>ANALYST</option>
        <option>ADMIN</option>
    </select><br><br>

    <button type="submit">Add</button>
</form>

</body>
</html>
